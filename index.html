<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 7 Science MCQ Test</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #4f46e5;
            --primary-light: #eeecf9;
            --success: #22c55e;
            --success-light: #f0fdf4;
            --error: #ef4444;
            --error-light: #fef2f2;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .quiz-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header {
            margin-bottom: 24px;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 5%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question-box {
            animation: fadeIn 0.4s ease-in-out;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .option-item.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }

        .option-item.correct {
            border-color: var(--success);
            background: var(--success-light);
            color: var(--success);
        }

        .option-item.wrong {
            border-color: var(--error);
            background: var(--error-light);
            color: var(--error);
        }

        .feedback {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .feedback.correct-box {
            display: block;
            background: var(--success-light);
            color: var(--success);
        }

        .feedback.wrong-box {
            display: block;
            background: var(--error-light);
            color: var(--error);
        }

        .action-btn {
            width: 100%;
            background: var(--text-main);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .score-view {
            text-align: center;
            padding: 20px 0;
            display: none;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-ui">
        <div class="header">
            <h1 class="title">Class 7 Science Test</h1>
            <div style="display: flex; justify-content: space-between;" class="subtitle">
                <span id="question-counter">Question 1 of 20</span>
                <span>Score 1 Mark Each</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress"></div>
            </div>
        </div>

        <div class="question-box">
            <p class="question-text" id="question">Loading question...</p>
            <ul class="options-list" id="options">
                </ul>
        </div>

        <div class="feedback" id="feedback"></div>

        <button class="action-btn" id="action-button" onclick="handleSubmit()">Submit Answer</button>
    </div>

    <div class="score-view" id="score-ui">
        <div class="score-circle" id="final-score">0/20</div>
        <h2 style="margin-bottom: 8px;">Quiz Completed!</h2>
        <p class="subtitle" style="margin-bottom: 24px;">Great effort finishing your Class 7 Science Test.</p>
        <button class="action-btn" onclick="location.reload()">Restart Quiz</button>
    </div>
</div>

<script>
    const quizData = [
        {q: "Which of the following is a chemical change?", opt: ["Melting ice", "Breaking glass", "Rusting iron", "Cutting paper"], ans: 2},
        {q: "In a physical change,", opt: ["A new substance is formed", "Only the shape or state changes", "Heat is always produced", "Light is always produced"], ans: 1},
        {q: "Which one is an example of a physical change?", opt: ["Burning wood", "Cooking an egg", "Boiling water", "Digestion"], ans: 2},
        {q: "Sour taste in fruits is mainly due to the presence of", opt: ["Salt", "Sugar", "Acids", "Water"], ans: 2},
        {q: "Turmeric stain turns reddish-brown when soap is applied because soap is", opt: ["Acidic", "Neutral", "Basic", "Salty"], ans: 2},
        {q: "Which process helps plants prepare food?", opt: ["Digestion", "Respiration", "Photosynthesis", "Evaporation"], ans: 2},
        {q: "During photosynthesis, plants take in", opt: ["Oxygen", "Carbon dioxide", "Nitrogen", "Hydrogen"], ans: 1},
        {q: "Which gas is released during photosynthesis?", opt: ["Carbon dioxide", "Nitrogen", "Oxygen", "Hydrogen"], ans: 2},
        {q: "The tiny particle of matter is called", opt: ["Cell", "Atom", "Tissue", "Molecule"], ans: 1},
        {q: "Which particle has a negative charge?", opt: ["Proton", "Neutron", "Electron", "Nucleus"], ans: 2},
        {q: "The center part of an atom is called", opt: ["Orbit", "Shell", "Nucleus", "Electron"], ans: 2},
        {q: "A battery gives us", opt: ["Water", "Electricity", "Air", "Food"], ans: 1},
        {q: "Which device uses a battery?", opt: ["Torch", "Chair", "Book", "Table"], ans: 0},
        {q: "Which is an example of a change that can be reversed?", opt: ["Melting ice", "Burning paper", "Cooking rice", "Rusting iron"], ans: 0},
        {q: "Water vapour changes into water droplets by", opt: ["Melting", "Condensation", "Freezing", "Boiling"], ans: 1},
        {q: "Water changes into vapour due to", opt: ["Cooling", "Heating", "Freezing", "Mixing"], ans: 1},
        {q: "Which of the following is NOT a chemical change?", opt: ["Baking a cake", "Rotting fruit", "Exploding fireworks", "Crushing a can"], ans: 3},
        {q: "In a dry cell, the middle rod is made of", opt: ["Iron", "Plastic", "Carbon", "Wood"], ans: 2},
        {q: "Breaking glass is a", opt: ["Chemical change", "Physical change", "Biological change", "Permanent reaction"], ans: 1},
        {q: "Plants prepare their food with the help of", opt: ["Moonlight", "Sunlight", "Air only", "Soil only"], ans: 1}
    ];

    let currentIdx = 0;
    let score = 0;
    let selectedAns = null;
    let hasSubmitted = false;

    const qText = document.getElementById('question');
    const optionsBlock = document.getElementById('options');
    const feedbackBox = document.getElementById('feedback');
    const actionBtn = document.getElementById('action-button');
    const counterText = document.getElementById('question-counter');
    const progressBar = document.getElementById('progress');

    function loadQuestion() {
        hasSubmitted = false;
        selectedAns = null;
        actionBtn.innerText = "Submit Answer";
        feedbackBox.className = "feedback";
        
        counterText.innerText = `Question ${currentIdx + 1} of ${quizData.length}`;
        progressBar.style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;

        let currentQuestion = quizData[currentIdx];
        qText.innerText = currentQuestion.q;
        optionsBlock.innerHTML = "";

        currentQuestion.opt.forEach((option, index) => {
            let li = document.createElement('li');
            li.className = "option-item";
            li.innerText = option;
            li.onclick = () => selectOption(index, li);
            optionsBlock.appendChild(li);
        });
    }

    function selectOption(index, element) {
        if (hasSubmitted) return;
        selectedAns = index;
        
        let allOptions = document.querySelectorAll('.option-item');
        allOptions.forEach(opt => opt.classList.remove('selected'));
        
        element.classList.add('selected');
    }

    function handleSubmit() {
        if (selectedAns === null) {
            alert("Please select an answer first!");
            return;
        }

        if (!hasSubmitted) {
            hasSubmitted = true;
            let currentQuestion = quizData[currentIdx];
            let allOptions = document.querySelectorAll('.option-item');

            if (selectedAns === currentQuestion.ans) {
                score++;
                allOptions[selectedAns].classList.add('correct');
                feedbackBox.innerText = "Correct answer! Well done.";
                feedbackBox.classList.add('correct-box');
            } else {
                allOptions[selectedAns].classList.add('wrong');
                allOptions[currentQuestion.ans].classList.add('correct');
                feedbackBox.innerText = `Incorrect. Correct answer is: ${currentQuestion.opt[currentQuestion.ans]}`;
                feedbackBox.classList.add('wrong-box');
            }

            actionBtn.innerText = currentIdx === quizData.length - 1 ? "Finish Test" : "Next Question";
        } else {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }
    }

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        const scoreUi = document.getElementById('score-ui');
        scoreUi.style.display = 'block';
        document.getElementById('final-score').innerText = `${score}/${quizData.length}`;
    }

    // Initialize layout on load
    loadQuestion();
</script>

</body>
</html>
